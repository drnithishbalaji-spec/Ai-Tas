<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAS AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.284.0/dist/umd/lucide.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tas-ai-app';

        try {
            const app = initializeApp(firebaseConfig);
            window.firebasePortal = { 
                db: getFirestore(app), 
                auth: getAuth(app),
                doc, setDoc, getDoc, deleteDoc, collection,
                signInAnonymously, onAuthStateChanged, signOut,
                appId, isConfigured: true 
            };
        } catch (e) {
            window.firebasePortal = { isConfigured: false, error: e.message };
        }
    </script>

    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake-anim { animation: shake 0.2s ease-in-out 0s 2; }
        .ios-input { font-size: 16px !important; }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentPage, setCurrentPage] = useState('auth');
            // FIX: Initial state is now 'false' to show Register/Create screen first
            const [isLoginMode, setIsLoginMode] = useState(false); 
            const [userName, setUserName] = useState('');
            const [pin, setPin] = useState(['', '', '', '', '', '']);
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isShaking, setIsShaking] = useState(false);
            
            const pinInputs = useRef([]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                const unsubscribe = window.firebasePortal.onAuthStateChanged(window.firebasePortal.auth, (u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                const enteredPin = pin.join('');
                if (enteredPin.length < 6 || !userName.trim()) return;

                setIsLoading(true);
                setError('');

                try {
                    if (!user) await window.firebasePortal.signInAnonymously(window.firebasePortal.auth);
                    
                    const userId = userName.toLowerCase().trim().replace(/\s/g, '_');
                    const userDocRef = window.firebasePortal.doc(
                        window.firebasePortal.db, 
                        'artifacts', window.firebasePortal.appId, 'public', 'data', 'users', userId
                    );
                    
                    const docSnap = await window.firebasePortal.getDoc(userDocRef);

                    if (isLoginMode) {
                        if (docSnap.exists() && docSnap.data().pin === enteredPin) {
                            setCurrentPage('foyer');
                        } else {
                            throw new Error("Invalid name or PIN.");
                        }
                    } else {
                        if (docSnap.exists()) {
                            throw new Error("This name is already registered.");
                        }
                        await window.firebasePortal.setDoc(userDocRef, {
                            name: userName,
                            pin: enteredPin,
                            registeredAt: new Date().toISOString()
                        });
                        setCurrentPage('foyer');
                    }
                } catch (err) {
                    setError(err.message);
                    setIsShaking(true);
                    setPin(['','','','','','']);
                    setTimeout(() => setIsShaking(false), 500);
                } finally {
                    setIsLoading(false);
                }
            };

            if (currentPage === 'auth') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                        <div className={`w-full max-w-md bg-white rounded-[2.5rem] p-8 md:p-12 text-center shadow-2xl transition-all ${isShaking ? 'shake-anim border border-red-200' : ''}`}>
                            <div className="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-200">
                                <i data-lucide={isLoginMode ? "key" : "user-plus"} className="text-white w-8 h-8"></i>
                            </div>
                            
                            <h1 className="text-3xl font-black text-slate-900 mb-1 tracking-tight">TAS AI</h1>
                            <p className="text-slate-400 font-bold mb-8 uppercase text-[10px] tracking-widest">
                                {isLoginMode ? 'Login to Portal' : 'Create New Account'}
                            </p>

                            <form onSubmit={handleAuth} className="space-y-6">
                                <div className="text-left">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                                    <input 
                                        className="ios-input w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold"
                                        placeholder="Enter name"
                                        value={userName}
                                        onChange={e => setUserName(e.target.value)}
                                        required
                                    />
                                </div>

                                <div className="text-left">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">6-Digit PIN</label>
                                    <div className="flex justify-between gap-1 mt-1">
                                        {pin.map((d, i) => (
                                            <input 
                                                key={i}
                                                ref={el => pinInputs.current[i] = el}
                                                type="number"
                                                pattern="\d*"
                                                className="ios-input w-full h-14 text-center text-xl font-bold bg-slate-50 border border-slate-200 rounded-xl focus:border-indigo-500 outline-none"
                                                value={d}
                                                onChange={e => {
                                                    const val = e.target.value.slice(-1);
                                                    const newPin = [...pin];
                                                    newPin[i] = val;
                                                    setPin(newPin);
                                                    if (val && i < 5) pinInputs.current[i+1].focus();
                                                }}
                                                onKeyDown={e => e.key === 'Backspace' && !pin[i] && i > 0 && pinInputs.current[i-1].focus()}
                                            />
                                        ))}
                                    </div>
                                </div>

                                <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                                    {isLoading ? 'Processing...' : (isLoginMode ? 'Sign In' : 'Create Account')}
                                </button>
                            </form>

                            {error && <p className="mt-4 text-red-500 text-[10px] font-black uppercase tracking-tight">{error}</p>}

                            <div className="mt-8 pt-6 border-t border-slate-100">
                                <p className="text-slate-400 text-[10px] font-bold uppercase mb-3">
                                    {isLoginMode ? "Need to register first?" : "Already have an account?"}
                                </p>
                                <button 
                                    onClick={() => {setIsLoginMode(!isLoginMode); setError('');}}
                                    className="text-indigo-600 text-xs font-black uppercase tracking-widest py-3 px-8 border-2 border-indigo-600 rounded-full hover:bg-indigo-600 hover:text-white transition-all active:scale-95"
                                >
                                    {isLoginMode ? "Switch to Create Account" : "Switch to Login"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-white">
                    <nav className="h-16 border-b px-6 flex items-center justify-between">
                        <div className="font-black text-slate-800 tracking-tight flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                                <i data-lucide="sparkles" className="w-4 h-4"></i>
                            </div>
                            TAS AI FOYER
                        </div>
                        <button onClick={() => window.location.reload()} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                            <i data-lucide="log-out" className="w-5 h-5"></i>
                        </button>
                    </nav>
                    <main className="flex-1 p-8 flex flex-col items-center justify-center text-center">
                        <div className="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mb-6">
                            <i data-lucide="user" className="text-indigo-600 w-10 h-10"></i>
                        </div>
                        <h2 className="text-2xl font-black text-slate-900">Welcome, {userName}!</h2>
                        <p className="text-slate-500 mt-2 max-w-sm">You are successfully logged into the cloud platform.</p>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
